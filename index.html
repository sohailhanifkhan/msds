<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSDS Library</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #2c3e50;
    }

    input {
        padding: 10px;
        width: 80%;
        margin-bottom: 20px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    .container {
        max-width: 600px;
        margin: auto;
    }

    button {
        display: block;
        width: 100%;
        margin: 6px 0;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        background: #3498db;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #2980b9;
    }
</style>
</head>

<body>

<h1>MSDS Chemical List</h1>

<input type="text" id="search" placeholder="Search Chemical..." onkeyup="filterList()">

<div class="container" id="list"></div>

<script>

// 🔴 https://docs.google.com/spreadsheets/d/e/2PACX-1vSSksGapM9TAjh1gbpm6JxtidPcA9XD2gwT40anhDJCfSys4xqlNKTAZIBnuxVBzgpNZWyvMvhAWjrA/pub?output=csv
const sheetURL = "https://docs.google.com/spreadsheets/d/e/XXXXX/pub?output=csv";

let msdsData = [];

fetch(sheetURL)
.then(response => response.text())
.then(data => {
    const rows = data.split("\n");

    // Skip header (Row 1)
    for (let i = 1; i < rows.length; i++) {
        let cols = rows[i].split(",");

        let name = cols[0];
        let url = cols[1];

        if (name && url) {
            msdsData.push({ name: name, url: url });
        }
    }

    displayList(msdsData);
});

function displayList(data) {
    const container = document.getElementById("list");
    container.innerHTML = "";

    data.forEach(item => {
        let btn = document.createElement("button");
        btn.textContent = item.name;

        btn.onclick = () => {
            window.open(item.url, '_blank');
        };

        container.appendChild(btn);
    });
}

function filterList() {
    let search = document.getElementById("search").value.toLowerCase();

    let filtered = msdsData.filter(item =>
        item.name.toLowerCase().includes(search)
    );

    displayList(filtered);
}

</script>

</body>
</html>
